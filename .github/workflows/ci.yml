name: ci

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore Autofire.Next.sln

      - name: Build
        run: dotnet build Autofire.Next.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test Autofire.Next.sln --configuration Release --no-build
