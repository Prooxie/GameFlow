name: ci

on:
  push:
    branches: [ main, master, develop, dev ]
    tags:     [ "v*" ]
  pull_request:
    branches: [ main, master, develop, dev ]
  workflow_dispatch:

# Default permissions are read-only; jobs that need to write (release) opt in.
permissions:
  contents: read

# A single in-flight run per branch. New pushes cancel older queued runs so
# CI doesn't pile up on rapid-fire commits.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true

jobs:
  build-test:
    name: Build & test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ windows-latest, ubuntu-latest, macos-latest ]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so deterministic builds embed a real commit

      - name: Setup .NET (from global.json)
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      # Cache the NuGet HTTP cache + global packages folder. Keyed off the
      # central package versions file so a version bump invalidates the cache.
      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.nuget/packages
            ~/.local/share/NuGet/v3-cache
          key: nuget-${{ runner.os }}-${{ hashFiles('**/Directory.Packages.props', '**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore Autofire.Next.sln --locked-mode || dotnet restore Autofire.Next.sln

      - name: Build
        run: dotnet build Autofire.Next.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test Autofire.Next.sln --configuration Release --no-build --logger "trx" --logger "console;verbosity=normal" --results-directory TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}
          path: TestResults/**/*.trx
          if-no-files-found: ignore

  publish:
    name: Publish ${{ matrix.rid }}
    needs: build-test
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - { rid: win-x64,   os: windows-latest, ext: zip    }
          - { rid: linux-x64, os: ubuntu-latest,  ext: tar.gz }
          - { rid: osx-arm64, os: macos-latest,   ext: tar.gz }
          - { rid: osx-x64,   os: macos-13,       ext: tar.gz }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET (from global.json)
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Publish
        shell: bash
        run: |
          dotnet publish src/Autofire.App/Autofire.App.csproj \
            --configuration Release \
            --runtime ${{ matrix.rid }} \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -p:PublishTrimmed=false \
            -p:Version=${GITHUB_REF_NAME#v} \
            -o publish/${{ matrix.rid }}

      - name: Package zip
        if: matrix.ext == 'zip'
        shell: bash
        run: |
          cd publish/${{ matrix.rid }}
          7z a -tzip "../../Autofire-Next-${GITHUB_REF_NAME}-${{ matrix.rid }}.zip" *

      - name: Package tar.gz
        if: matrix.ext == 'tar.gz'
        shell: bash
        run: |
          cd publish/${{ matrix.rid }}
          tar -czf "../../Autofire-Next-${GITHUB_REF_NAME}-${{ matrix.rid }}.tar.gz" *

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Autofire-Next-${{ matrix.rid }}
          path: Autofire-Next-*-${{ matrix.rid }}.${{ matrix.ext }}

  release:
    name: Create GitHub release
    needs: publish
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/**/*
